server:
  port: ${SERVER_PORT:8090}

spring:
  application:
    name: api-gateway

  cloud:
    gateway:
      server:
        webflux:
          routes:
            - id: auth-service
              uri: ${AUTH_SERVICE_URI:http://localhost:8081}
              predicates:
                - Path=/api/auth/**
            - id: user-service
              uri: ${USER_SERVICE_URI:http://localhost:8080}
              predicates:
                - Path=/users/**,/cards/**
            - id: order-service
              uri: ${ORDER_SERVICE_URI:http://localhost:8082}
              predicates:
                - Path=/orders/**
            - id: payment-service
              uri: ${PAYMENT_SERVICE_URI:http://localhost:8084}
              predicates:
                - Path=/api/payments/**

gateway:
  security:
    open-endpoints:
      - /api/auth/login
      - /api/auth/register
      - /api/auth/refresh
      - /api/auth/validate
      - /actuator/**

jwt:
  secret: ${JWT_SECRET}

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: always