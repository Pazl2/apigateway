services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: ${DB_USERNAME:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-secret}
      POSTGRES_DB: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    configs:
      - source: pg_init
        target: /docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  auth-service:
    build: ../authentication-service
    ports:
      - "8081:8081"
    environment:
      DB_URL: ${AUTH_DB_URL:-jdbc:postgresql://postgres:5432/auth_db}
      DB_USERNAME: ${DB_USERNAME:-postgres}
      DB_PASSWORD: ${DB_PASSWORD:-secret}
      JWT_SECRET: ${JWT_SECRET}
    depends_on:
      postgres:
        condition: service_healthy

  user-service:
    build: ../javaadvance1
    ports:
      - "8080:8080"
    environment:
      SPRING_PROFILES_ACTIVE: docker
      DB_NAME: user_db
      DB_USERNAME: ${DB_USERNAME:-postgres}
      DB_PASSWORD: ${DB_PASSWORD:-secret}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      AUTH_SERVICE_URL: http://auth-service:8081
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  orderservice:
    build: ../orderservice
    ports:
      - "8082:8082"
    environment:
      SPRING_PROFILES_ACTIVE: docker
      DB_NAME: order_db
      DB_USERNAME: ${DB_USERNAME:-postgres}
      DB_PASSWORD: ${DB_PASSWORD:-secret}
      USER_SERVICE_URL: http://user-service:8080
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
    depends_on:
      postgres:
        condition: service_healthy
      user-service:
        condition: service_started
      kafka:
        condition: service_healthy

  mongo:
    image: mongo:7.0
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${PAYMENT_DB_USERNAME:-root}
      MONGO_INITDB_ROOT_PASSWORD: ${PAYMENT_DB_PASSWORD:-secret}
    volumes:
      - payment_mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  kafka:
    image: apache/kafka:3.8.0
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://:29092,CONTROLLER://:29093,PLAINTEXT_HOST://:9092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:29093
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    healthcheck:
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-broker-api-versions.sh --bootstrap-server localhost:9092 || exit 1"]
      interval: 10s
      timeout: 10s
      retries: 10
      start_period: 20s

  paymentservice:
    build: ../paymentservice
    ports:
      - "8084:8084"
    environment:
      DB_HOST: mongo
      DB_PORT: 27017
      DB_USERNAME: ${PAYMENT_DB_USERNAME:-root}
      DB_PASSWORD: ${PAYMENT_DB_PASSWORD:-secret}
      DB_NAME: ${PAYMENT_DB_NAME:-payments}
      DB_AUTH: admin
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      JWT_SECRET: ${JWT_SECRET}
    depends_on:
      mongo:
        condition: service_healthy
      kafka:
        condition: service_healthy

  api-gateway:
    build: .
    ports:
      - "8090:8090"
    environment:
      SPRING_PROFILES_ACTIVE: docker
      SERVER_PORT: 8090
      JWT_SECRET: ${JWT_SECRET}
      AUTH_SERVICE_URI: http://auth-service:8081
      USER_SERVICE_URI: http://user-service:8080
      ORDER_SERVICE_URI: http://orderservice:8082
      PAYMENT_SERVICE_URI: http://paymentservice:8084
    depends_on:
      auth-service:
        condition: service_started
      user-service:
        condition: service_started
      orderservice:
        condition: service_started
      paymentservice:
        condition: service_started

configs:
  pg_init:
    content: |
      CREATE DATABASE auth_db;
      CREATE DATABASE user_db;
      CREATE DATABASE order_db;

volumes:
  postgres_data:
  payment_mongo_data: